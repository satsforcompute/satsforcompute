name: Website Preview

# Per-PR previews of the static site to satsforcompute.com/pr-preview/<N>/.
# Same setup as devopsdefender/dd's gh-pages branch — rossjrw's
# pr-preview-action handles the dance of deploying / cleaning up.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
