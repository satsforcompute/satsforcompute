name: CI

on:
  push:
    branches: [main]
  pull_request:

# Ci-runs on PR pushes are cancellable; main runs queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --target x86_64-unknown-linux-musl -- -D warnings
      - name: cargo test
        run: cargo test --workspace --target x86_64-unknown-linux-musl
      - name: cargo build (release, static)
        run: cargo build --release --target x86_64-unknown-linux-musl
